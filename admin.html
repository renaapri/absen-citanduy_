<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekapitulasi Daftar Hadir Pegawai - UPTD PSDA WS CITANDUY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
        body { font-family: 'Roboto', sans-serif; background-color: #f0f2f5; }
        /* Warna Header Biru Tua seperti di Foto */
        .header-excel-style { background-color: #1f4e78; color: white; }
        .border-custom { border: 1px solid #000; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-[1200px] mx-auto bg-white shadow-2xl rounded-lg overflow-hidden">
        
        <div class="text-center p-6 border-b-4 border-black">
            <h2 class="text-xl font-bold">PEMERINTAH PROVINSI JAWA BARAT</h2>
            <h2 class="text-xl font-bold">DINAS SUMBER DAYA AIR</h2>
            <h1 class="text-lg font-bold uppercase">UPTD PENGELOLAAN SUMBER DAYA AIR WILAYAH SUNGAI CITANDUY</h1>
            <p class="text-sm">Jl. R.A.A. WIRATANUNINGRAT NO. 3 KOTA TASIKMALAYA</p>
        </div>

        <div class="p-6 bg-gray-50 flex flex-wrap justify-between items-center gap-6">
            <div class="flex flex-col items-center p-2 bg-white border rounded shadow-sm">
                <span class="text-[10px] font-bold mb-1">SCAN UNTUK ABSEN</span>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://absen-citanduy-9783.vercel.app/" class="w-24 h-24">
            </div>

            <div class="flex-1 flex flex-wrap gap-3 items-end justify-end">
                <div>
                    <label class="block text-[10px] font-bold uppercase">Dari:</label>
                    <input type="date" id="filter-mulai" class="border p-2 rounded text-sm">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase">Sampai:</label>
                    <input type="date" id="filter-sampai" class="border p-2 rounded text-sm">
                </div>
                <button onclick="loadData()" class="bg-blue-800 text-white px-4 py-2 rounded font-bold text-sm hover:bg-blue-900">CARI DATA</button>
                <button onclick="exportToExcelPuas()" class="bg-green-700 text-white px-4 py-2 rounded font-bold text-sm hover:bg-green-800">📊 DOWNLOAD EXCEL</button>
            </div>
        </div>

        <div class="text-center py-4">
            <h3 class="font-bold border-b-2 border-black inline-block px-4">REKAPITULASI DAFTAR HADIR PEGAWAI</h3>
            <p id="info-periode" class="text-sm mt-1">Periode: -</p>
        </div>

        <div class="overflow-x-auto p-4">
            <table class="w-full border-collapse border border-black text-sm">
                <thead>
                    <tr class="header-excel-style uppercase text-[11px]">
                        <th class="border border-black p-2 w-10">NO</th>
                        <th class="border border-black p-2">NIP</th>
                        <th class="border border-black p-2">NAMA PEGAWAI</th>
                        <th class="border border-black p-2">JABATAN</th>
                        <th class="border border-black p-2 text-center">TANGGAL</th>
                        <th class="border border-black p-2 text-center">MASUK</th>
                        <th class="border border-black p-2 text-center">PULANG</th>
                        <th class="border border-black p-2 text-center">KETERANGAN</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="bg-white">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const SB_URL = 'https://kcrxrpueovjzngliwltj.supabase.co'; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtjcnhycHVlb3Zqem5nbGl3bHRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NjQ0MDMsImV4cCI6MjA4NzU0MDQwM30.RSwl-CzjWlk3n4ifLl3gJdiFa3HltwasQKWDYvvJBks';
        const dbSupabase = supabase.createClient(SB_URL, SB_KEY);

        async function loadData() {
            const tbody = document.getElementById('table-body');
            const start = document.getElementById('filter-mulai').value;
            const end = document.getElementById('filter-sampai').value;
            
            if(start && end) {
                document.getElementById('info-periode').innerText = `Periode: ${start.split('-').reverse().join('/')} s/d ${end.split('-').reverse().join('/')}`;
            }

            tbody.innerHTML = '<tr><td colspan="8" class="p-4 text-center">Memuat Data...</td></tr>';

            try {
                let query = dbSupabase.from('laporan_absen').select('*');
                if (start) query = query.gte('tanggal', start);
                if (end) query = query.lte('tanggal', end);
                const { data, error } = await query.order('tanggal', { ascending: false });

                if (error) throw error;
                tbody.innerHTML = '';

                data.forEach((row, index) => {
                    const jamIn = new Date(row.created_at).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', hour12: false });
                    const jamOut = (row.jam_pulang && row.jam_pulang !== "NULL") ? row.jam_pulang : '-';
                    const isLate = jamIn > "06:30"; 
                    const statusText = isLate ? 'TERLAMBAT' : 'TEPAT WAKTU';
                    const statusColor = isLate ? 'text-red-600' : 'text-green-700';

                    tbody.innerHTML += `
                        <tr class="border border-black uppercase text-[10px]">
                            <td class="border border-black p-2 text-center">${index + 1}</td>
                            <td class="border border-black p-2">'${row.nip}</td>
                            <td class="border border-black p-2 font-bold">${row.nama}</td>
                            <td class="border border-black p-2">${row.jabatan}</td>
                            <td class="border border-black p-2 text-center">${row.tanggal.split('-').reverse().join('/')}</td>
                            <td class="border border-black p-2 text-center">${jamIn.replace(/:/g, '.')}</td>
                            <td class="border border-black p-2 text-center">${jamOut.replace(/:/g, '.')}</td>
                            <td class="border border-black p-2 text-center font-bold ${statusColor}">${statusText}</td>
                        </tr>`;
                });
            } catch (err) { alert("Gagal mengambil data"); }
        }

        function exportToExcelPuas() {
            const table = document.querySelector("table");
            const start = document.getElementById('filter-mulai').value || "-";
            const end = document.getElementById('filter-sampai').value || "-";
            
            // Buat Array data untuk Excel
            let dataArr = [
                ["PEMERINTAH PROVINSI JAWA BARAT"],
                ["DINAS SUMBER DAYA AIR"],
                ["UPTD PENGELOLAAN SUMBER DAYA AIR WILAYAH SUNGAI CITANDUY"],
                ["Jl. R.A.A. WIRATANUNINGRAT NO. 3 KOTA TASIKMALAYA"],
                [""],
                ["REKAPITULASI DAFTAR HADIR PEGAWAI"],
                [`Periode: ${start} s/d ${end}`],
                [""]
            ];

            // Masukkan Header Tabel
            dataArr.push(["NO", "NIP", "NAMA PEGAWAI", "JABATAN", "TANGGAL", "MASUK", "PULANG", "KETERANGAN"]);

            // Masukkan Isi Tabel
            const rows = document.querySelectorAll("#table-body tr");
            rows.forEach(tr => {
                let rowData = [];
                tr.querySelectorAll("td").forEach(td => rowData.push(td.innerText));
                dataArr.push(rowData);
            });

            // Tambahkan Tanda Tangan
            dataArr.push([""]);
            dataArr.push(["", "", "", "", "", "", "Tasikmalaya, " + new Date().toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'})]);
            dataArr.push(["", "", "", "", "", "", "Kepala UPTD PSDA WS Citanduy,"]);
            dataArr.push([""], [""]);
            dataArr.push(["", "", "", "", "", "", "NAMA PIMPINAN ANDA"]);
            dataArr.push(["", "", "", "", "", "", "NIP. 1982736455243"]);

            const ws = XLSX.utils.aoa_to_sheet(dataArr);
            
            // Set Lebar Kolom
            ws['!cols'] = [{wch:5}, {wch:20}, {wch:30}, {wch:25}, {wch:12}, {wch:10}, {wch:10}, {wch:15}];

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Rekap");
            XLSX.writeFile(wb, "Rekap_Absensi_Citanduy.xlsx");
        }

        window.onload = loadData;
    </script>
</body>
</html>
