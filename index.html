<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Absensi UPTD PSDA Citanduy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #064e3b 0%, #111827 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .main-card {
            background: white;
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 420px;
            position: relative;
            border-top: 8px solid #22c55e;
        }
        .logo-img { max-width: 60px; height: auto; margin-bottom: 10px; }
        .header-title { font-size: 1.1rem; font-weight: 800; color: #111827; line-height: 1.2; }
        .header-sub { font-size: 0.7rem; font-weight: 700; color: #059669; letter-spacing: 0.5px; }
        
        #clock { 
            font-size: 1.3rem; 
            font-weight: 700; 
            background: #f3f4f6; 
            padding: 8px 20px; 
            border-radius: 12px; 
            display: inline-block; 
            margin: 10px 0;
        }

        .form-label { font-size: 0.75rem; font-weight: 700; color: #4b5563; text-transform: uppercase; margin-bottom: 5px; }
        .input-group-text { background: #f9fafb; border-right: none; color: #9ca3af; border-radius: 10px 0 0 10px; }
        .form-control, .form-select { 
            border-radius: 10px; 
            background-color: #f9fafb; 
            font-size: 14px; 
            padding: 12px;
            border-left: none;
        }

        .btn-absensi { 
            border-radius: 15px; 
            padding: 16px; 
            font-weight: 700; 
            width: 100%; 
            border: none; 
            font-size: 14px;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-masuk { background: #22c55e; color: white; margin-bottom: 12px; }
        .btn-terlambat { background: #f97316; color: white; margin-bottom: 12px; }
        
        .btn-pulang { background: white; color: #d1d5db; border: 1px solid #e5e7eb; }
        .btn-pulang.active { color: #ef4444; border: 2px solid #ef4444; background: white; }
        .btn-pulang:disabled { opacity: 0.6; cursor: not-allowed; }

        .loading-overlay { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.9); z-index: 100; border-radius: 25px;
            justify-content: center; align-items: center; flex-direction: column; 
        }
    </style>
</head>
<body>

<div class="main-card">
    <div id="loader" class="loading-overlay">
        <div class="spinner-border text-success mb-2"></div>
        <small class="fw-bold">Mengirim Data...</small>
    </div>

    <div class="text-center">
        <img src="img/g2.png" alt="Logo" class="logo-img">
        <div class="header-title">DINAS SUMBER DAYA AIR</div>
        <div class="header-sub mb-3">UPTD PSDA WILAYAH SUNGAI CITANDUY</div>
        <hr style="opacity: 0.1;">
        <div id="greeting" class="text-muted small fw-bold">Selamat Datang</div>
        <div id="clock">00:00:00</div>
    </div>

    <form id="absenForm" class="mt-3">
        <div class="mb-3">
            <label class="form-label">NIP Pegawai</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                <input type="text" id="nip" class="form-control" placeholder="Contoh: 198XXXXXXXX" required>
            </div>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Nama Lengkap</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-user"></i></span>
                <input type="text" id="nama" class="form-control" placeholder="Nama tanpa gelar" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Jabatan</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-briefcase"></i></span>
                <select id="jabatan" class="form-select" required>
                    <option value="" selected disabled>-- Pilih Jabatan --</option>
                    <option>Penata Layanan Operasional</option>
                    <option>Operator Layanan Operasional</option>
                    <option>Tenaga Teknis Sumber Daya Air</option>
                    <option>Pengadministrasi Perkantoran</option>
                </select>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Foto Selfie</label>
            <input type="file" id="foto" class="form-control" accept="image/*" capture="user" style="border-left: 1px solid #dee2e6;">
        </div>

        <button type="button" onclick="kirimData('Masuk')" id="btnMasuk" class="btn btn-absensi btn-masuk">
            <i class="fas fa-camera me-2"></i> Absen Masuk
        </button>

        <button type="button" onclick="kirimData('Pulang')" id="btnPulang" class="btn btn-absensi btn-pulang" disabled>
            <i class="fas fa-home me-2"></i> Absen Pulang
        </button>
        
        <div id="info-waktu" class="text-center mt-3 small text-muted">Memeriksa Waktu...</div>
    </form>
</div>

<script>
    const SUPABASE_URL = 'https://kcrxrpueovjzngliwltj.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_jye1AjnIADhnjyFo7qWPJw_fTPSStcp';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function updateWaktu() {
        const sekarang = new Date();
        const jam = sekarang.getHours();
        const menit = sekarang.getMinutes();
        const jamMenit = `${String(jam).padStart(2, '0')}:${String(menit).padStart(2, '0')}`;
        
        document.getElementById('clock').innerText = jamMenit + ":" + String(sekarang.getSeconds()).padStart(2, '0');

        // Update Ucapan
        const greeting = document.getElementById('greeting');
        if(jam < 11) greeting.innerText = "Selamat Pagi";
        else if(jam < 15) greeting.innerText = "Selamat Siang";
        else greeting.innerText = "Selamat Sore";

        // Logika Tombol Masuk (Terlambat jika > 06:30)
        const btnMasuk = document.getElementById('btnMasuk');
        if (jamMenit > "06:30") {
            btnMasuk.classList.replace('btn-masuk', 'btn-terlambat');
            btnMasuk.innerHTML = '<i class="fas fa-exclamation-triangle me-2"></i> Absen Masuk (Terlambat)';
        }

        // Logika Kunci Pulang (Buka jam 13:10)
        const btnPulang = document.getElementById('btnPulang');
        const infoWaktu = document.getElementById('info-waktu');
        if (jam < 12 || (jam === 13 && menit < 10)) {
            btnPulang.disabled = true;
            btnPulang.classList.remove('active');
            infoWaktu.innerHTML = "🔒 Terkunci s/d Jam 13:10";
        } else {
            btnPulang.disabled = false;
            btnPulang.classList.add('active');
            infoWaktu.innerHTML = "🔓 Waktu Pulang Tiba";
        }
    }
    
    setInterval(updateWaktu, 1000);
    updateWaktu();

    async function kirimData(status) {
        const nip = document.getElementById('nip').value;
        const nama = document.getElementById('nama').value;
        const tgl = new Date().toLocaleDateString('en-CA');
        const jam = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});

        if(!nip || !nama) return alert("Isi NIP dan Nama!");
        document.getElementById('loader').style.display = 'flex';

        try {
            if (status === 'Masuk') {
                const { error } = await _supabase.from('laporan_absen').insert([{ 
                    nip, nama, jabatan: document.getElementById('jabatan').value,
                    tanggal: tgl, status: 'HADIR'
                }]);
                if (error) throw error;
                alert("Berhasil Absen Masuk!");
            } else {
                const { data: row } = await _supabase.from('laporan_absen').select('id').eq('nip', nip).eq('tanggal', tgl).maybeSingle();
                if (!row) return alert("Data masuk hari ini tidak ditemukan!");
                
                const { error } = await _supabase.from('laporan_absen').update({ 
                    jam_pulang: jam, status: 'SELESAI' 
                }).eq('id', row.id);
                if (error) throw error;
                alert("Berhasil Absen Pulang! Status: SELESAI");
            }
            location.reload();
        } catch (e) { alert("Error: " + e.message); }
        finally { document.getElementById('loader').style.display = 'none'; }
    }
</script>
</body>
</html>
