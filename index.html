<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Absensi UPTD Citanduy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a503a 0%, #111827 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .main-card {
            background: white;
            border-radius: 25px;
            padding: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 450px;
            position: relative;
            border-top: 8px solid #2ecc71;
        }
        .logo-img { max-width: 70px; margin-bottom: 10px; }
        .form-label { font-size: 12px; font-weight: 700; color: #444; }
        .form-control, .form-select { border-radius: 10px; padding: 10px; background-color: #f8f9fa; font-size: 14px; }
        .btn-absensi { border-radius: 12px; padding: 14px; font-weight: 700; text-transform: uppercase; border: none; width: 100%; transition: 0.3s; }
        .btn-masuk { background: #27ae60; color: white; margin-bottom: 10px; }
        .btn-terlambat { background: #e67e22; color: white; margin-bottom: 10px; }
        .btn-pulang { background: white; color: #e74c3c; border: 2px solid #e74c3c; }
        .btn-pulang:disabled { opacity: 0.4; border-color: #ccc; color: #999; }
        #clock { font-size: 1.4rem; font-weight: 800; color: #333; margin: 10px 0; }
        .loading-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 100; justify-content: center; align-items: center; flex-direction: column; border-radius: 25px; }
    </style>
</head>
<body>

<div class="main-card">
    <div id="loader" class="loading-overlay">
        <div class="spinner-border text-success mb-2"></div>
        <small class="fw-bold">Sedang Memproses...</small>
    </div>

    <div class="text-center">
        <img src="img/g2.png" alt="Logo" class="logo-img">
        <h5 class="fw-bold mb-0">UPTD PSDA CITANDUY</h5>
        <div id="clock">00:00:00</div>
        <hr>
    </div>

    <form id="absenForm">
        <div class="mb-3">
            <label class="form-label">NIP PEGAWAI</label>
            <input type="text" id="nip" class="form-control" placeholder="Masukkan NIP" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label">NAMA LENGKAP</label>
            <input type="text" id="nama" class="form-control" placeholder="Nama tanpa gelar" required>
        </div>

        <div class="mb-3">
            <label class="form-label">JABATAN</label>
            <select id="jabatan" class="form-select" required>
                <option value="" selected disabled>-- Pilih Jabatan --</option>
                <option>Penata Layanan Operasional</option>
                <option>Operator Layanan Operasional</option>
                <option>Tenaga Teknis Sumber Daya Air</option>
                <option>Pengadministrasi Perkantoran</option>
            </select>
        </div>

        <div class="mb-4">
            <label class="form-label">FOTO SELFIE</label>
            <input type="file" id="foto" class="form-control" accept="image/*" capture="user">
        </div>

        <button type="button" onclick="kirimData('Masuk')" id="btnMasuk" class="btn btn-absensi btn-masuk">
            Absen Masuk
        </button>

        <button type="button" onclick="kirimData('Pulang')" id="btnPulang" class="btn btn-absensi btn-pulang">
            Absen Pulang
        </button>
        <div id="info-waktu" class="text-center mt-3 small text-muted"></div>
    </form>
</div>

<script>
    const SUPABASE_URL = 'https://kcrxrpueovjzngliwltj.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_jye1AjnIADhnjyFo7qWPJw_fTPSStcp';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function updateWaktu() {
        const sekarang = new Date();
        const jam = sekarang.getHours();
        const menit = sekarang.getMinutes();
        const jamMenit = `${String(jam).padStart(2, '0')}:${String(menit).padStart(2, '0')}`;
        document.getElementById('clock').innerText = jamMenit + ":" + String(sekarang.getSeconds()).padStart(2, '0');

        const btnMasuk = document.getElementById('btnMasuk');
        if (jamMenit > "06:30") {
            btnMasuk.classList.add('btn-terlambat');
            btnMasuk.innerText = "Absen Masuk (Terlambat)";
        }

        const btnPulang = document.getElementById('btnPulang');
        if (jam < 14) {
            btnPulang.disabled = true;
            document.getElementById('info-waktu').innerText = "🔒 Pulang Terkunci s/d 14:00";
        } else {
            btnPulang.disabled = false;
            document.getElementById('info-waktu').innerText = "🔓 Waktu Pulang Tiba";
        }
    }
    setInterval(updateWaktu, 1000);
    updateWaktu();

    async function kirimData(status) {
        const nip = document.getElementById('nip').value;
        const nama = document.getElementById('nama').value;
        const jabatan = document.getElementById('jabatan').value;
        const fotoFile = document.getElementById('foto').files[0];
        const tgl = new Date().toLocaleDateString('en-CA');
        const jamSekarang = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});

        if(!nip || !nama || !jabatan) return alert("Lengkapi data!");
        
        document.getElementById('loader').style.display = 'flex';

        try {
            let publicUrl = "";

            // UPLOAD KE BUCKET "foto_absen" (Underscore, bukan strip)
            if (status === 'Masuk') {
                if(!fotoFile) throw new Error("Foto wajib diunggah!");
                
                const fileName = `${Date.now()}_${nip}.jpg`;
                const { data: upData, error: upErr } = await _supabase.storage
                    .from('foto_absen')
                    .upload(fileName, fotoFile);

                if (upErr) throw upErr;

                const { data: urlData } = _supabase.storage.from('foto_absen').getPublicUrl(fileName);
                publicUrl = urlData.publicUrl;

                // INSERT DATA MASUK
                const { error: inErr } = await _supabase.from('laporan_absen').insert([{ 
                    nip, nama, jabatan, tanggal: tgl, status: 'HADIR', foto_url: publicUrl 
                }]);
                if (inErr) throw inErr;
                alert("✅ Berhasil Absen Masuk!");
            } else {
                // UPDATE DATA PULANG
                const { data: existing } = await _supabase.from('laporan_absen')
                    .select('id').eq('nip', nip).eq('tanggal', tgl).maybeSingle();

                if (!existing) throw new Error("Anda belum absen masuk hari ini!");

                const { error: upErr } = await _supabase.from('laporan_absen')
                    .update({ jam_pulang: jamSekarang, status: 'SELESAI' })
                    .eq('id', existing.id);
                if (upErr) throw upErr;
                alert("✅ Berhasil Absen Pulang!");
            }
            location.reload();
        } catch (e) {
            alert(e.message);
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }
</script>
</body>
</html>
