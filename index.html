<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Absensi UPTD Citanduy - Fix Table Name</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a503a 0%, #1e3c72 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .main-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 480px;
            position: relative;
        }
        .main-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 8px;
            background: linear-gradient(to right, #27ae60, #2ecc71);
        }
        .form-control, .form-select { border-radius: 12px; padding: 12px; background-color: #f8f9fa; border: 1px solid #eee; font-size: 14px; }
        .btn-absensi { border-radius: 15px; padding: 15px; font-weight: 700; text-transform: uppercase; border: none; width: 100%; }
        .btn-masuk { background: linear-gradient(to right, #27ae60, #2ecc71); color: white; margin-bottom: 15px; }
        .btn-pulang { background: #fff; color: #e74c3c; border: 2px solid #e74c3c; }
        #clock { font-size: 1.2rem; font-weight: 700; background: #f1f2f6; color: #2f3542; padding: 5px 15px; border-radius: 10px; display: inline-block; }
        .loading-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 100; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

<div class="main-card">
    <div id="loader" class="loading-overlay">
        <div class="spinner-border text-success mb-2"></div>
        <small class="fw-bold text-dark">Sedang Mengirim Absen...</small>
    </div>

    <div class="text-center mb-4">
        <h4 class="fw-bold text-dark m-0">DINAS SUMBER DAYA AIR</h4>
        <p class="fw-bold text-success small mb-3">UPTD PSDA WILAYAH SUNGAI CITANDUY</p>
        <hr>
        <div id="greeting" class="welcome-text">Selamat Datang</div>
        <div id="clock">00:00:00</div>
    </div>

    <form id="absenForm">
        <div class="mb-3">
            <label class="form-label small fw-bold text-uppercase">NIP Pegawai</label>
            <input type="text" id="nip" class="form-control" placeholder="198XXXXXXXX" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label small fw-bold text-uppercase">Nama Lengkap</label>
            <input type="text" id="nama" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label small fw-bold text-uppercase">Jabatan</label>
            <select id="jabatan" class="form-select" required>
                <option value="" selected disabled>-- Pilih Jabatan --</option>
                <option value="Pengadministrasi Perkantoran">Pengadministrasi Perkantoran</option>
                <option value="Pengolah Data dan Informasi">Pengolah Data dan Informasi</option>
                <option value="Penata Layanan Operasional">Penata Layanan Operasional</option>
                <option value="Tenaga Teknis Sumber Daya Air">Tenaga Teknis Sumber Daya Air</option>
                <option value="Operator Layanan Operasional">Operator Layanan Operasional</option>
            </select>
        </div>

        <div class="mb-4">
            <label class="form-label small fw-bold text-uppercase">Foto Selfie</label>
            <input type="file" id="foto" class="form-control" accept="image/*" capture="user">
        </div>

        <button type="button" onclick="kirimData('Masuk')" class="btn btn-absensi btn-masuk shadow">
            Absen Masuk
        </button>

        <button type="button" onclick="kirimData('Pulang')" class="btn btn-absensi btn-pulang">
            Absen Pulang
        </button>
        <div id="info-waktu" class="text-center mt-3 small text-muted font-monospace"></div>
    </form>
</div>

<script>
    const SUPABASE_URL = 'https://kcrxrpueovjzngliwltj.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_jye1AjnIADhnjyFo7qWPJw_fTPSStcp';
    
    const { createClient } = supabase;
    const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    // NAMA TABEL DISESUAIKAN (PAKAI STRIP)
    const NAMA_TABEL = 'laporan-absen';

    function updateWaktu() {
        const sekarang = new Date();
        const jamMenit = sekarang.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        document.getElementById('clock').innerText = jamMenit;
        document.getElementById('info-waktu').innerHTML = "🛠️ <span class='text-primary'>TESTING: Jam Pulang Terkunci 07.00</span>";
    }
    setInterval(updateWaktu, 1000);

    async function kirimData(statusAbsen) {
        const nip = document.getElementById('nip').value.trim();
        const nama = document.getElementById('nama').value;
        const jabatan = document.getElementById('jabatan').value;
        const fotoFile = document.getElementById('foto').files[0];

        if (!nip || !nama) return alert("NIP dan Nama wajib diisi!");
        document.getElementById('loader').style.display = 'flex';

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const koordinat = `${pos.coords.latitude}, ${pos.coords.longitude}`;
            const tglHariIni = new Date().toLocaleDateString('en-CA'); 

            try {
                if (statusAbsen === 'Masuk') {
                    let publicFotoUrl = "";
                    if (fotoFile) {
                        const fileName = `${Date.now()}_${nip}.jpg`;
                        await _supabase.storage.from('foto-absen').upload(fileName, fotoFile);
                        const { data: urlData } = _supabase.storage.from('foto-absen').getPublicUrl(fileName);
                        publicFotoUrl = urlData.publicUrl;
                    }

                    const { error } = await _supabase.from(NAMA_TABEL).insert([{ 
                        nip, nama, jabatan, tanggal: tglHariIni, 
                        status: 'Hadir', lokasi: koordinat, foto_url: publicFotoUrl 
                    }]);

                    if (error) throw error;
                    alert("Berhasil Absen Masuk!");
                } else {
                    const jamTestingPulang = "07:00"; 

                    // Cari data berdasarkan NIP dan Tanggal
                    const { data: baris } = await _supabase.from(NAMA_TABEL)
                        .select('id').eq('nip', nip).eq('tanggal', tglHariIni).maybeSingle();

                    if (!baris) return alert("Data masuk hari ini tidak ditemukan!");

                    // Update jam_pulang saja
                    const { error } = await _supabase.from(NAMA_TABEL)
                        .update({ jam_pulang: jamTestingPulang })
                        .eq('id', baris.id);

                    if (error) throw error;
                    alert("Berhasil Absen Pulang! (Tercatat 07:00)");
                }
                location.reload();
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }, (err) => {
            alert("Aktifkan GPS!");
            document.getElementById('loader').style.display = 'none';
        });
    }
</script>
</body>
</html>
