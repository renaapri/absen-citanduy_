<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Absensi UPTD Citanduy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a503a 0%, #1e3c72 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .main-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 480px;
            position: relative;
            overflow: hidden;
        }
        .main-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 8px;
            background: linear-gradient(to right, #27ae60, #2ecc71);
        }
        .logo-container {
            text-align: center;
            margin-bottom: 15px;
        }
        .logo-img {
            max-width: 80px;
            height: auto;
        }
        .welcome-text { font-size: 1.1rem; font-weight: 700; color: #666; margin-bottom: 5px; }
        .form-control, .form-select { border-radius: 12px; padding: 12px; background-color: #f8f9fa; border: 1px solid #eee; font-size: 14px; }
        .btn-absensi { border-radius: 15px; padding: 15px; font-weight: 700; transition: 0.3s; text-transform: uppercase; border: none; width: 100%; }
        .btn-masuk { background: linear-gradient(to right, #27ae60, #2ecc71); color: white; box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3); margin-bottom: 15px; }
        .btn-pulang { background: #fff; color: #e74c3c; border: 2px solid #e74c3c; }
        .btn-pulang:disabled { opacity: 0.5; cursor: not-allowed; }
        #clock { font-size: 1.2rem; font-weight: 700; background: #f1f2f6; color: #2f3542; padding: 5px 15px; border-radius: 10px; display: inline-block; transition: color 0.3s; }
        .loading-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 100; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

<div class="main-card">
    <div id="loader" class="loading-overlay">
        <div class="spinner-border text-success mb-2"></div>
        <small class="fw-bold text-dark">Sedang Mengirim Absen...</small>
        <small class="text-muted text-center px-3">Mohon jangan tutup halaman atau matikan GPS</small>
    </div>

    <div class="logo-container">
        <img src="img/g2.png" alt="Logo UPTD Citanduy" class="logo-img">
    </div>

    <div class="text-center mb-4">
        <h4 class="fw-bold text-dark m-0">DINAS SUMBER DAYA AIR</h4>
        <p class="fw-bold text-success small mb-3">UPTD PSDA WILAYAH SUNGAI CITANDUY</p>
        <hr>
        <div id="greeting" class="welcome-text">Selamat Datang</div>
        <div id="clock">00:00:00</div>
    </div>

    <form id="absenForm">
        <div class="mb-3">
            <label class="form-label small fw-bold text-uppercase">NIP Pegawai</label>
            <input type="text" id="nip" class="form-control" placeholder="Contoh: 198XXXXXXXX" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label small fw-bold text-uppercase">Nama Lengkap</label>
            <input type="text" id="nama" class="form-control" placeholder="Nama tanpa gelar" required>
        </div>

        <div class="mb-3">
            <label class="form-label small fw-bold text-uppercase">Jabatan</label>
            <select id="jabatan" class="form-select" required>
                <option value="" selected disabled>-- Pilih Jabatan --</option>
                <option value="Pengadministrasi Perkantoran">Pengadministrasi Perkantoran</option>
                <option value="Pengolah Data dan Informasi">Pengolah Data dan Informasi</option>
                <option value="Penata Layanan Operasional">Penata Layanan Operasional</option>
                <option value="Tenaga Teknis Sumber Daya Air">Tenaga Teknis Sumber Daya Air</option>
                <option value="Operator Layanan Operasional">Operator Layanan Operasional</option>
            </select>
        </div>

        <div class="mb-4">
            <label class="form-label small fw-bold text-uppercase">Foto Selfie</label>
            <input type="file" id="foto" class="form-control" accept="image/*" capture="user">
            <small class="text-danger" style="font-size: 10px;">*Wajib diunggah saat Absen Masuk</small>
        </div>

        <button type="button" onclick="kirimData('Masuk')" id="btnMasuk" class="btn btn-absensi btn-masuk shadow">
            <i class="fas fa-camera me-2"></i> Absen Masuk Sekarang
        </button>

        <button type="button" onclick="kirimData('Pulang')" id="btnPulang" class="btn btn-absensi btn-pulang mt-2">
            <i class="fas fa-home me-2"></i> Absen Pulang
        </button>
        <div id="info-waktu" class="text-center mt-3 small text-muted font-monospace">Memeriksa sistem...</div>
    </form>
</div>

<script>
    const SUPABASE_URL = 'https://kcrxrpueovjzngliwltj.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_jye1AjnIADhnjyFo7qWPJw_fTPSStcp';
    
    const { createClient } = supabase;
    const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    function updateWaktu() {
        const sekarang = new Date();
        const jam = sekarang.getHours();
        const menit = sekarang.getMinutes();
        const detik = sekarang.getSeconds();
        
        // Format jam untuk pembandingan (HH:mm)
        const jamMenit = `${String(jam).padStart(2, '0')}:${String(menit).padStart(2, '0')}`;
        
        const clockElement = document.getElementById('clock');
        clockElement.innerText = `${jamMenit}:${String(detik).padStart(2, '0')}`;

        // WARNA JAM: Merah jika sudah lewat jam 06:30 (Sesuai aturan Admin)
        if (jamMenit > "06:30" && jam < 11) {
            clockElement.style.color = "#e74c3c"; // Merah
        } else {
            clockElement.style.color = "#2f3542"; // Normal
        }

        const greeting = document.getElementById('greeting');
        if (jam >= 6 && jam < 11) greeting.innerText = "Selamat Pagi";
        else if (jam >= 11 && jam < 15) greeting.innerText = "Selamat Siang";
        else if (jam >= 15 && jam < 18) greeting.innerText = "Selamat Sore";
        else greeting.innerText = "Selamat Malam";

        const btnPulang = document.getElementById('btnPulang');
        const infoWaktu = document.getElementById('info-waktu');
        
        // KUNCI PULANG: Terbuka mulai jam 14:00
        if (jam < 10) {
            btnPulang.disabled = true;
            infoWaktu.innerHTML = "🔒 <span class='text-danger'>Tombol Pulang Terkunci s/d Jam 10:15</span>";
        } else {
            btnPulang.disabled = false;
            infoWaktu.innerHTML = "🔓 <span class='text-success'>Waktu Pulang Telah Tiba</span>";
        }
    }
    
    setInterval(updateWaktu, 1000);
    updateWaktu();

    async function kirimData(statusAbsen) {
    const nip = document.getElementById('nip').value;
    const nama = document.getElementById('nama').value;
    const jabatan = document.getElementById('jabatan').value;
    const fotoFile = document.getElementById('foto').files[0];

    if (!nip || !nama || !jabatan) {
        alert("⚠️ Harap isi NIP, Nama, dan Jabatan!");
        return;
    }

    document.getElementById('loader').style.display = 'flex';

    navigator.geolocation.getCurrentPosition(async (pos) => {
        const koordinat = `${pos.coords.latitude}, ${pos.coords.longitude}`;
        const sekarang = new Date();
        const tglHariIni = sekarang.toISOString().split('T')[0]; // Format: 2026-03-02
        const jamSekarang = sekarang.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', hour12: false });

        try {
            if (statusAbsen === 'Masuk') {
                // --- LOGIKA ABSEN MASUK (Insert Baris Baru) ---
                let publicFotoUrl = "";
                if (fotoFile) {
                    const fileName = `${Date.now()}_${nip}.jpg`;
                    const { error: upError } = await _supabase.storage.from('foto-absen').upload(fileName, fotoFile);
                    if (upError) throw upError;
                    publicFotoUrl = _supabase.storage.from('foto-absen').getPublicUrl(fileName).data.publicUrl;
                }

                const { error: inError } = await _supabase
                    .from('laporan_absen')
                    .insert([{ 
                        nip, nama, jabatan, status: 'Hadir', lokasi: koordinat, foto_url: publicFotoUrl 
                    }]);
                
                if (inError) throw inError;
                alert("✅ Berhasil Absen Masuk!");

            } else {
                // --- LOGIKA ABSEN PULANG (Update Baris Hari Ini) ---
                // 1. Cari dulu data absen masuk si NIP ini untuk HARI INI
                const { data: dataMasuk, error: fetchError } = await _supabase
                    .from('laporan_absen')
                    .select('id')
                    .eq('nip', nip)
                    .gte('created_at', `${tglHariIni}T00:00:00`)
                    .lte('created_at', `${tglHariIni}T23:59:59`)
                    .order('created_at', { ascending: false })
                    .limit(1)
                    .single();

                if (fetchError || !dataMasuk) {
                    alert("❌ Data masuk tidak ditemukan! Kamu harus absen masuk dulu pagi tadi.");
                    return;
                }

                // 2. Update baris tersebut dengan jam pulang dan lokasi pulang
                const { error: upError } = await _supabase
                    .from('laporan_absen')
                    .update({ 
                        jam_pulang: jamSekarang, 
                        lokasi_pulang: koordinat 
                    })
                    .eq('id', dataMasuk.id);

                if (upError) throw upError;
                alert("✅ Berhasil Absen Pulang!");
            }
            location.reload();
        } catch (err) {
            alert("❌ Gagal: " + err.message);
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }, (err) => {
        document.getElementById('loader').style.display = 'none';
        alert("❌ Gagal GPS! Pastikan GPS HP aktif.");
    }, { enableHighAccuracy: true });
}
</script>
</body>
</html>
