<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Absensi UPTD Citanduy - User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a503a 0%, #1e3c72 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .main-card {
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 450px;
            position: relative;
            overflow: hidden;
        }
        .main-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 8px;
            background: linear-gradient(to right, #27ae60, #2ecc71);
        }
        .logo-container { text-align: center; margin-bottom: 10px; }
        .logo-img { max-width: 60px; height: auto; }
        .welcome-text { font-size: 1rem; font-weight: 700; color: #666; margin-bottom: 5px; }
        .form-control, .form-select { border-radius: 12px; padding: 10px; background-color: #f8f9fa; border: 1px solid #eee; font-size: 13px; }
        .btn-absensi { border-radius: 15px; padding: 12px; font-weight: 700; transition: 0.3s; text-transform: uppercase; border: none; width: 100%; font-size: 14px; }
        .btn-masuk { background: linear-gradient(to right, #27ae60, #2ecc71); color: white; box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3); margin-bottom: 12px; }
        .btn-pulang-locked { background: #f1f2f6; color: #a4b0be; border: 2px solid #dfe4ea; cursor: not-allowed; }
        .btn-pulang-active { background: #fff; color: #e74c3c; border: 2px solid #e74c3c; box-shadow: 0 4px 15px rgba(231, 76, 60, 0.2); }
        
        #clock { font-size: 1.5rem; font-weight: 800; background: #2f3542; color: #ffffff; padding: 5px 20px; border-radius: 12px; display: inline-block; letter-spacing: 2px; }
        .loading-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 100; justify-content: center; align-items: center; flex-direction: column; }
        
        #notif-status { font-size: 11px; margin-top: 8px; min-height: 20px; }
    </style>
</head>
<body>

<audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<div class="main-card">
    <div id="loader" class="loading-overlay">
        <div class="spinner-border text-success mb-2"></div>
        <small class="fw-bold text-dark">Sedang Mengirim Absen...</small>
    </div>

    <div class="logo-container">
        <img src="https://uptdpsdawscitanduy.wargaloka.org/img/logo-jabar.png" alt="Logo" class="logo-img">
    </div>

    <div class="text-center mb-3">
        <h5 class="fw-bold text-dark m-0">DINAS SUMBER DAYA AIR</h5>
        <p class="text-success fw-bold small mb-2" style="font-size: 10px;">UPTD PSDA WILAYAH SUNGAI CITANDUY</p>
        <hr class="my-2">
        <div id="greeting" class="welcome-text">Memuat...</div>
        <div id="clock">00:00:00</div>
        <div id="notif-status"></div>
    </div>

    <form id="absenForm">
        <div class="mb-2">
            <label class="form-label small fw-bold text-uppercase" style="font-size: 10px;">NIP Pegawai</label>
            <input type="text" id="nip" class="form-control" placeholder="198XXXXXXXX" required>
        </div>
        
        <div class="mb-2">
            <label class="form-label small fw-bold text-uppercase" style="font-size: 10px;">Nama Lengkap</label>
            <input type="text" id="nama" class="form-control" required>
        </div>

        <div class="mb-2">
            <label class="form-label small fw-bold text-uppercase" style="font-size: 10px;">Jabatan</label>
            <select id="jabatan" class="form-select" required>
                <option value="" selected disabled>-- Pilih Jabatan --</option>
                <option value="Pengadministrasi Perkantoran">Pengadministrasi Perkantoran</option>
                <option value="Pengolah Data dan Informasi">Pengolah Data dan Informasi</option>
                <option value="Penata Layanan Operasional">Penata Layanan Operasional</option>
                <option value="Tenaga Teknis Sumber Daya Air">Tenaga Teknis Sumber Daya Air</option>
                <option value="Operator Layanan Operasional">Operator Layanan Operasional</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label small fw-bold text-uppercase" style="font-size: 10px;">Foto Selfie</label>
            <input type="file" id="foto" class="form-control" accept="image/*" capture="user">
        </div>

        <button type="button" onclick="kirimData('Masuk')" id="btnMasuk" class="btn btn-absensi btn-masuk shadow">
            <i class="fas fa-camera me-2"></i> Absen Masuk
        </button>

        <button type="button" onclick="kirimData('Pulang')" id="btnPulang" class="btn btn-absensi btn-pulang-locked mt-1">
            <i class="fas fa-home me-2"></i> Absen Pulang
        </button>
        
        <div id="info-waktu" class="text-center mt-3 small text-muted font-monospace" style="font-size: 9px;">Sistem Siap</div>
    </form>
</div>

<script>
    const SUPABASE_URL = 'https://kcrxrpueovjzngliwltj.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_jye1AjnIADhnjyFo7qWPJw_fTPSStcp';
    
    const { createClient } = supabase;
    const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
    const TABEL = 'laporan_absen';

    let suaraSudahBunyi = false;

    function updateWaktu() {
        const sekarang = new Date();
        const jam = sekarang.getHours();
        const menit = sekarang.getMinutes();
        const detik = sekarang.getSeconds();
        
        const jamMenitDetik = `${String(jam).padStart(2, '0')}.${String(menit).padStart(2, '0')}.${String(detik).padStart(2, '0')}`;
        document.getElementById('clock').innerText = jamMenitDetik;

        const notifStatus = document.getElementById('notif-status');
        const btnPulang = document.getElementById('btnPulang');
        const audio = document.getElementById('notif-sound');

        // LOGIKA TOMBOL PULANG (Hanya Aktif Jam 14.00 ke atas)
        if (jam < 14) {
            notifStatus.innerHTML = "<span class='text-danger fw-bold'><i class='fas fa-lock'></i> ABSEN PULANG TERKUNCI</span>";
            btnPulang.className = "btn btn-absensi btn-pulang-locked mt-1";
            btnPulang.disabled = true;
            suaraSudahBunyi = false;
        } else {
            notifStatus.innerHTML = "<span class='text-primary fw-bold'><i class='fas fa-bell'></i> SUDAH WAKTU PULANG!</span>";
            btnPulang.className = "btn btn-absensi btn-pulang-active mt-1";
            btnPulang.disabled = false;
            
            // Efek Berkedip
            notifStatus.style.visibility = (detik % 2 === 0) ? "visible" : "hidden";

            if (!suaraSudahBunyi) {
                audio.play().catch(e => console.log("Audio play blocked"));
                suaraSudahBunyi = true;
            }
        }

        const greeting = document.getElementById('greeting');
        if (jam >= 6 && jam < 11) greeting.innerText = "Selamat Pagi";
        else if (jam >= 11 && jam < 15) greeting.innerText = "Selamat Siang";
        else if (jam >= 15 && jam < 18) greeting.innerText = "Selamat Sore";
        else greeting.innerText = "Selamat Malam";

        document.getElementById('info-waktu').innerHTML = "✅ <span class='text-success'>Waktu Real-time Aktif</span>";
    }
    
    setInterval(updateWaktu, 1000);
    updateWaktu();

   async function kirimData(statusAbsen) {
        const nip = document.getElementById('nip').value.trim();
        const nama = document.getElementById('nama').value;
        const jabatan = document.getElementById('jabatan').value;
        const fotoFile = document.getElementById('foto').files[0];

        const sekarang = new Date();
        const jamSekarang = sekarang.getHours();

        if (statusAbsen === 'Pulang' && jamSekarang < 14) {
            return alert("BELUM WAKTUNYA PULANG! Tombol absen pulang baru bisa digunakan mulai jam 14:00.");
        }

        if (!nip || !nama) return alert("NIP dan Nama wajib diisi!");
        document.getElementById('loader').style.display = 'flex';

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const koordinat = `${pos.coords.latitude}, ${pos.coords.longitude}`;
            const tglHariIni = new Date().toLocaleDateString('en-CA'); 

            try {
                if (statusAbsen === 'Masuk') {
                    let publicFotoUrl = "";
                    if (fotoFile) {
                        const fileName = `${Date.now()}_${nip}.jpg`;
                        const { error: uploadError } = await _supabase.storage
                            .from('foto-absen').upload(fileName, fotoFile);
                        if (uploadError) throw uploadError;
                        const { data: urlData } = _supabase.storage.from('foto-absen').getPublicUrl(fileName);
                        publicFotoUrl = urlData.publicUrl;
                    }
                    const { error } = await _supabase.from(TABEL).insert([{ 
                        nip, nama, jabatan, tanggal: tglHariIni, 
                        status: 'Hadir', lokasi: koordinat, foto_url: publicFotoUrl 
                    }]);
                    if (error) throw error;
                    alert("Berhasil Absen Masuk!");
                } 
                else {
                    const jamKlik = `${String(sekarang.getHours()).padStart(2, '0')}:${String(sekarang.getMinutes()).padStart(2, '0')}`;
                    const { data: baris, error: fetchError } = await _supabase
                        .from(TABEL).select('id').eq('nip', nip).eq('tanggal', tglHariIni).maybeSingle();

                    if (fetchError) throw fetchError;
                    if (!baris) return alert("Data masuk tidak ditemukan untuk hari ini!");

                    const { error: updateError } = await _supabase
                        .from(TABEL).update({ "jam_pulang": jamKlik }).eq('id', baris.id);

                    if (updateError) throw updateError;
                    alert(`Berhasil Absen Pulang! Jam: ${jamKlik}`);
                }
                location.reload();
            } catch (err) {
                alert("Kesalahan: " + err.message);
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }, (err) => {
            alert("Gagal ambil lokasi! Pastikan GPS aktif.");
            document.getElementById('loader').style.display = 'none';
        });
    }
</script>
</body>
</html>
