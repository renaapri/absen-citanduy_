<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Absensi UPTD Citanduy - User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a503a 0%, #1e3c72 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .main-card {
            background: white;
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            position: relative;
        }
        .main-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 6px;
            background: #2ecc71;
            border-radius: 25px 25px 0 0;
        }
        .logo-container { text-align: center; margin-bottom: 10px; }
        .logo-img { max-width: 70px; height: auto; }
        
        .header-title { font-size: 1.1rem; font-weight: 800; color: #2d3436; margin: 0; }
        .header-sub { font-size: 0.75rem; font-weight: 700; color: #27ae60; margin-bottom: 10px; }
        
        #clock { 
            font-size: 1.3rem; 
            font-weight: 700; 
            background: #f1f2f6; 
            color: #2f3542; 
            padding: 6px 18px; 
            border-radius: 10px; 
            display: inline-block; 
            margin-top: 5px;
        }
        
        .form-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: #2d3436; margin-bottom: 5px; }
        .form-control, .form-select { border-radius: 10px; padding: 10px; background-color: #f8f9fa; border: 1px solid #eee; font-size: 13px; }
        
        .btn-absensi { border-radius: 12px; padding: 12px; font-weight: 700; transition: 0.3s; text-transform: uppercase; border: none; width: 100%; font-size: 13px; }
        .btn-masuk { background: #2ecc71; color: white; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3); }
        .btn-pulang { background: #fff; color: #e74c3c; border: 1.5px solid #e74c3c; }
        
        .loading-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 100; border-radius: 25px; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

<div class="main-card">
    <div id="loader" class="loading-overlay">
        <div class="spinner-border text-success mb-2"></div>
        <small class="fw-bold">Mengirim Absen...</small>
    </div>

    <div class="logo-container">
        <img src="img/g2.png" alt="Logo" class="logo-img" onerror="this.src='https://uptdpsdawscitanduy.wargaloka.org/img/logo-jabar.png'">
    </div>

    <div class="text-center mb-4">
        <p class="header-title">DINAS SUMBER DAYA AIR</p>
        <p class="header-sub">UPTD PSDA WILAYAH SUNGAI CITANDUY</p>
        <hr class="my-2">
        <div id="greeting" class="small fw-bold text-secondary">Selamat Pagi</div>
        <div id="clock">00:00:00</div>
    </div>

    <form id="absenForm">
        <div class="mb-2">
            <label class="form-label">NIP Pegawai</label>
            <input type="text" id="nip" class="form-control" placeholder="198XXXXXXXX" required>
        </div>
        
        <div class="mb-2">
            <label class="form-label">Nama Lengkap</label>
            <input type="text" id="nama" class="form-control" required>
        </div>

        <div class="mb-2">
            <label class="form-label">Jabatan</label>
            <select id="jabatan" class="form-select" required>
                <option value="" selected disabled>-- Pilih Jabatan --</option>
                <option value="Pengadministrasi Perkantoran">Pengadministrasi Perkantoran</option>
                <option value="Pengolah Data dan Informasi">Pengolah Data dan Informasi</option>
                <option value="Penata Layanan Operasional">Penata Layanan Operasional</option>
                <option value="Tenaga Teknis Sumber Daya Air">Tenaga Teknis Sumber Daya Air</option>
                <option value="Operator Layanan Operasional">Operator Layanan Operasional</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Foto Selfie</label>
            <input type="file" id="foto" class="form-control" accept="image/*" capture="user">
        </div>

        <button type="button" onclick="kirimData('Masuk')" class="btn btn-absensi btn-masuk">
            <i class="fas fa-camera me-2"></i> ABSEN MASUK SEKARANG
        </button>

        <button type="button" onclick="kirimData('Pulang')" class="btn btn-absensi btn-pulang">
            <i class="fas fa-home me-2"></i> ABSEN PULANG
        </button>
        
        <div class="text-center mt-3">
            <small style="font-size: 10px;" class="text-success fw-bold">
                <i class="fas fa-check-square"></i> Waktu Real-time Aktif
            </small>
        </div>
    </form>
</div>

<script>
    const SUPABASE_URL = 'https://kcrxrpueovjzngliwltj.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_jye1AjnIADhnjyFo7qWPJw_fTPSStcp';
    
    const { createClient } = supabase;
    const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
    const TABEL = 'laporan_absen';

    function updateWaktu() {
        const sekarang = new Date();
        const jam = String(sekarang.getHours()).padStart(2, '0');
        const menit = String(sekarang.getMinutes()).padStart(2, '0');
        const detik = String(sekarang.getSeconds()).padStart(2, '0');
        
        document.getElementById('clock').innerText = `${jam}:${menit}:${detik}`;

        const greeting = document.getElementById('greeting');
        const h = sekarang.getHours();
        if (h >= 5 && h < 11) greeting.innerText = "Selamat Pagi";
        else if (h >= 11 && h < 15) greeting.innerText = "Selamat Siang";
        else if (h >= 15 && h < 18) greeting.innerText = "Selamat Sore";
        else greeting.innerText = "Selamat Malam";
    }
    
    setInterval(updateWaktu, 1000);
    updateWaktu();

    async function kirimData(statusAbsen) {
        const nip = document.getElementById('nip').value.trim();
        const nama = document.getElementById('nama').value;
        const jabatan = document.getElementById('jabatan').value;
        const fotoFile = document.getElementById('foto').files[0];

        if (!nip || !nama || !jabatan) return alert("Harap isi NIP, Nama, dan Jabatan!");
        
        // Proteksi Pulang
        if (statusAbsen === 'Pulang' && new Date().getHours() < 14) {
            return alert("Belum waktunya pulang! (Minimal jam 14:00)");
        }

        document.getElementById('loader').style.display = 'flex';

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const koordinat = `${pos.coords.latitude}, ${pos.coords.longitude}`;
            const tglHariIni = new Date().toLocaleDateString('en-CA'); 

            try {
                if (statusAbsen === 'Masuk') {
                    let publicFotoUrl = "";
                    if (fotoFile) {
                        const fileName = `${Date.now()}_${nip}.jpg`;
                        const { error: uploadError } = await _supabase.storage.from('foto-absen').upload(fileName, fotoFile);
                        if (uploadError) throw uploadError;
                        const { data: urlData } = _supabase.storage.from('foto-absen').getPublicUrl(fileName);
                        publicFotoUrl = urlData.publicUrl;
                    }

                    const { error } = await _supabase.from(TABEL).insert([{ 
                        nip, nama, jabatan, tanggal: tglHariIni, 
                        status: 'Hadir', lokasi: koordinat, foto_url: publicFotoUrl 
                    }]);
                    if (error) throw error;
                    alert("Berhasil Absen Masuk!");
                } else {
                    const jamKlik = `${String(new Date().getHours()).padStart(2, '0')}:${String(new Date().getMinutes()).padStart(2, '0')}`;
                    const { data: baris } = await _supabase.from(TABEL).select('id').eq('nip', nip).eq('tanggal', tglHariIni).maybeSingle();
                    if (!baris) return alert("Data absen masuk tidak ditemukan!");

                    const { error: updateError } = await _supabase.from(TABEL).update({ "jam_pulang": jamKlik }).eq('id', baris.id);
                    if (updateError) throw updateError;
                    alert("Berhasil Absen Pulang!");
                }
                location.reload();
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }, (err) => {
            alert("Gagal ambil lokasi. Pastikan GPS aktif!");
            document.getElementById('loader').style.display = 'none';
        });
    }
</script>
</body>
</html>
